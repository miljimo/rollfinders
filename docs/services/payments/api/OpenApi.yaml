openapi: 3.0.3
info:
  title: Payment System MVP API
  version: 0.2.0
  description: Self-hosted Go JSON API for one-time Stripe card and PayPal wallet payments. Raw PAN and CVV fields are not accepted.
servers:
  - url: http://localhost:8080
security:
  - bearerApiKey: []
paths:
  /healthz:
    get:
      security: []
      responses:
        '200': { description: Service process is alive. }
  /readyz:
    get:
      security: []
      responses:
        '200': { description: Service is ready. }
        '503': { description: Service is not ready. }
  /metrics:
    get:
      security: []
      responses:
        '200': { description: Prometheus-compatible metrics. }
        '404': { description: Metrics disabled. }
  /v1/payments:
    get:
      summary: List recorded payment transactions
      description: Returns payment records stored by the payment service. Clients can use this for payment history without calling Stripe or PayPal directly.
      parameters:
        - in: query
          name: client_id
          schema: { type: string }
        - in: query
          name: resource_type
          schema: { type: string }
        - in: query
          name: resource_id
          schema: { type: string }
        - in: query
          name: payer_user_id
          schema: { type: string }
        - in: query
          name: payer_email
          schema: { type: string, format: email }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 100 }
      responses:
        '200':
          description: Recorded payment transactions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentHistoryResponse' }
        '401': { $ref: '#/components/responses/Error' }
    post:
      summary: Create a payment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePaymentRequest' }
            examples:
              stripe:
                value: { amount: 1299, currency: GBP, provider: stripe, payment_method_type: card, capture_method: automatic, metadata: { order_id: ord_123 } }
              paypal:
                value: { amount: 1299, currency: GBP, provider: paypal, payment_method_type: paypal }
      responses:
        '201':
          description: Payment created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
              examples:
                action_required:
                  value: { id: pay_000001, amount: 1299, currency: GBP, provider: paypal, payment_method_type: paypal, capture_method: automatic, status: requires_action, provider_payment_id: ORDER-demo, next_action: { type: paypal_approve, url: 'https://www.paypal.com/checkoutnow?token=ORDER-demo' }, created_at: '2026-06-09T12:00:00Z', updated_at: '2026-06-09T12:00:00Z' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/checkouts:
    post:
      summary: Create a generic hosted checkout
      description: Creates an underlying payment and returns a hosted checkout URL for any registered client resource. The payment service owns provider callback URI handling and payment status orchestration; clients do not need to send success or cancel URLs.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCheckoutRequest' }
            examples:
              paypal:
                value:
                  client_id: rollfinders
                  client_state: order_123
                  resource_type: course_occurrence
                  resource_id: cmq123:2026-06-08:19:00
                  resource_label: Beginner BJJ
                  amount: 1000
                  currency: GBP
                  provider: paypal
                  payment_method_type: paypal
                  payer_email: student@example.com
                  metadata:
                    course_id: cmq123
                    academy_id: academy123
                    occurrence_date: '2026-06-08'
      responses:
        '201':
          description: Checkout created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Checkout' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/clients:
    post:
      summary: Register a payment service client
      description: Registers an application or service that can create payments and receive service-owned payment status callback redirects.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePaymentClientRequest' }
            examples:
              partner:
                value:
                  id: partner_app
                  name: Partner App
                  callback_url: https://partner.example.com/payments/callback
      responses:
        '201':
          description: Client registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentClient' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
  /v1/checkouts/{id}/callbacks/{result}:
    get:
      security: []
      summary: Handle provider checkout callback
      description: Service-owned browser callback endpoint used by provider return/cancel URLs. The payment service maps provider return state to canonical payment state and redirects to the registered client's callback URL.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: result
          required: true
          schema: { type: string, enum: [success, cancelled, failed, expired] }
      responses:
        '302': { description: Redirects to the configured application payment status URL. }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/payments/{id}:
    get:
      summary: Get payment
      parameters:
        - $ref: '#/components/parameters/PaymentID'
      responses:
        '200':
          description: Payment state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '401': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/payments/{id}/capture:
    post:
      summary: Capture an authorized payment
      parameters:
        - $ref: '#/components/parameters/PaymentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': { description: Captured payment., content: { application/json: { schema: { $ref: '#/components/schemas/Payment' } } } }
        '409': { $ref: '#/components/responses/Error' }
  /v1/payments/{id}/cancel:
    post:
      summary: Cancel an eligible payment
      parameters:
        - $ref: '#/components/parameters/PaymentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': { description: Cancelled payment., content: { application/json: { schema: { $ref: '#/components/schemas/Payment' } } } }
        '409': { $ref: '#/components/responses/Error' }
  /v1/payments/{id}/refunds:
    post:
      summary: Create a refund
      parameters:
        - $ref: '#/components/parameters/PaymentID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRefundRequest' }
            examples:
              partial: { value: { amount: 500, reason: requested_by_customer } }
      responses:
        '201': { description: Refund created., content: { application/json: { schema: { $ref: '#/components/schemas/Refund' } } } }
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
    get:
      summary: List refunds for a payment
      parameters:
        - $ref: '#/components/parameters/PaymentID'
      responses:
        '200':
          description: Refunds in creation order.
          content:
            application/json:
              schema:
                type: object
                required: [refunds]
                properties:
                  refunds:
                    type: array
                    items: { $ref: '#/components/schemas/Refund' }
        '404': { $ref: '#/components/responses/Error' }
  /v1/payees/{payee_id}/balances:
    get:
      summary: Get legacy payee payout balance
      description: Legacy compatibility endpoint. New clients must use Wallet Service balances and Transfer payout/withdrawal workflows for canonical payout availability.
      parameters:
        - in: path
          name: payee_id
          required: true
          schema: { type: string }
        - in: query
          name: client_id
          schema: { type: string }
        - in: query
          name: currency
          schema: { type: string, default: GBP }
      responses:
        '200': { description: Payee balance., content: { application/json: { schema: { $ref: '#/components/schemas/PayeeBalance' } } } }
        '401': { $ref: '#/components/responses/Error' }
  /v1/payees/{payee_id}/payout-requests:
    get:
      summary: List payout requests for a payee
      parameters:
        - in: path
          name: payee_id
          required: true
          schema: { type: string }
        - in: query
          name: client_id
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: currency
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 100 }
      responses:
        '200': { description: Payout requests., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequestListResponse' } } } }
        '401': { $ref: '#/components/responses/Error' }
    post:
      summary: Create a payout request
      parameters:
        - in: path
          name: payee_id
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePayoutRequest' }
      responses:
        '201': { description: Payout request created., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequest' } } } }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/payout-requests:
    get:
      summary: List payout requests across payees
      parameters:
        - in: query
          name: client_id
          schema: { type: string }
        - in: query
          name: payee_id
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: currency
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 100 }
      responses:
        '200': { description: Payout requests., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequestListResponse' } } } }
        '401': { $ref: '#/components/responses/Error' }
  /v1/payout-requests/{id}:
    get:
      summary: Get payout request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Payout request., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequest' } } } }
        '404': { $ref: '#/components/responses/Error' }
  /v1/payout-requests/{id}/approve:
    post:
      summary: Approve payout request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody: { $ref: '#/components/requestBodies/PayoutTransition' }
      responses:
        '200': { description: Updated payout request., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequest' } } } }
        '409': { $ref: '#/components/responses/Error' }
  /v1/payout-requests/{id}/reject:
    post:
      summary: Reject payout request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody: { $ref: '#/components/requestBodies/PayoutTransition' }
      responses:
        '200': { description: Updated payout request., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequest' } } } }
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/payout-requests/{id}/hold:
    post:
      summary: Hold payout request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody: { $ref: '#/components/requestBodies/PayoutTransition' }
      responses:
        '200': { description: Updated payout request., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequest' } } } }
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/payout-requests/{id}/release:
    post:
      summary: Release held payout request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody: { $ref: '#/components/requestBodies/PayoutTransition' }
      responses:
        '200': { description: Updated payout request., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequest' } } } }
        '409': { $ref: '#/components/responses/Error' }
  /v1/payout-requests/{id}/mark-paid:
    post:
      summary: Mark approved payout request as paid
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody: { $ref: '#/components/requestBodies/PayoutTransition' }
      responses:
        '200': { description: Updated payout request., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequest' } } } }
        '400': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /v1/payout-requests/{id}/cancel:
    post:
      summary: Cancel pending payout request
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody: { $ref: '#/components/requestBodies/PayoutTransition' }
      responses:
        '200': { description: Updated payout request., content: { application/json: { schema: { $ref: '#/components/schemas/PayoutRequest' } } } }
        '409': { $ref: '#/components/responses/Error' }
  /v1/webhooks/{provider}:
    post:
      security: []
      summary: Ingest provider webhook
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string, enum: [stripe, paypal] }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEvent' }
      responses:
        '200': { description: Accepted or duplicate. }
        '401': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
  parameters:
    PaymentID:
      in: path
      name: id
      required: true
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 1 }
  responses:
    Error:
      description: Canonical error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          examples:
            validation:
              value: { error: { code: validation_error, message: Payment request validation failed., request_id: req_example, details: { amount: must be a positive integer in minor currency units } } }
  schemas:
    CreatePaymentRequest:
      type: object
      required: [amount, currency, provider, payment_method_type]
      additionalProperties: false
      properties:
        amount: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        provider: { type: string, enum: [stripe, paypal] }
        payment_method_type: { type: string, enum: [card, google_pay, paypal] }
        capture_method: { type: string, enum: [automatic, manual] }
        external_reference: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }
    CreateRefundRequest:
      type: object
      additionalProperties: false
      properties:
        amount: { type: integer, format: int64, minimum: 1, description: Omit or use zero for full remaining refund. }
        reason: { type: string }
    CreateCheckoutRequest:
      type: object
      required: [resource_type, resource_id, amount, currency, provider, payment_method_type]
      additionalProperties: false
      properties:
        client_id: { type: string, description: Registered payment service client id. Defaults to the configured default client when omitted. }
        client_state: { type: string, description: Opaque client state returned to the client callback URL. }
        resource_type: { type: string, minLength: 1, description: Client-defined resource type such as course_occurrence, invoice, booking, order, or subscription_setup. }
        resource_id: { type: string, minLength: 1, description: Client-defined resource id. }
        resource_label: { type: string }
        amount: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        provider: { type: string, enum: [stripe, paypal] }
        payment_method_type: { type: string, enum: [card, google_pay, paypal] }
        payer_user_id: { type: string }
        payer_email: { type: string, format: email }
        success_url: { type: string, format: uri, deprecated: true, description: Legacy caller-supplied return URL. Omit for new integrations; the payment service owns callback URI handling. }
        cancel_url: { type: string, format: uri, deprecated: true, description: Legacy caller-supplied cancel URL. Omit for new integrations; the payment service owns callback URI handling. }
        metadata:
          type: object
          additionalProperties: { type: string }
    Checkout:
      type: object
      required: [checkout_session_id, checkout_url, payment_id, resource_type, resource_id, amount, currency, expires_at, created_at]
      properties:
        checkout_session_id: { type: string }
        client_id: { type: string }
        client_state: { type: string }
        checkout_url: { type: string, format: uri }
        payment_id: { type: string }
        resource_type: { type: string }
        resource_id: { type: string }
        resource_label: { type: string }
        amount: { type: integer, format: int64 }
        currency: { type: string }
        payer_user_id: { type: string }
        payer_email: { type: string, format: email }
        metadata:
          type: object
          additionalProperties: { type: string }
        success_url: { type: string, format: uri, deprecated: true }
        cancel_url: { type: string, format: uri, deprecated: true }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    CreatePaymentClientRequest:
      type: object
      required: [name, callback_url]
      additionalProperties: false
      properties:
        id: { type: string, description: Optional stable client id. If omitted, the service generates one. }
        name: { type: string, minLength: 1 }
        callback_url: { type: string, format: uri }
    PaymentClient:
      type: object
      required: [id, name, callback_url, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        callback_url: { type: string, format: uri }
        created_at: { type: string, format: date-time }
    Payment:
      type: object
      required: [id, amount, currency, provider, payment_method_type, capture_method, status, created_at, updated_at]
      properties:
        id: { type: string }
        amount: { type: integer, format: int64 }
        currency: { type: string }
        provider: { type: string }
        payment_method_type: { type: string }
        capture_method: { type: string }
        status: { type: string, enum: [requires_action, authorized, processing, succeeded, failed, cancelled, partially_refunded, refunded] }
        refunded_amount: { type: integer, format: int64 }
        external_reference: { type: string }
        metadata: { type: object, additionalProperties: { type: string } }
        provider_payment_id: { type: string }
        provider_status: { type: string }
        next_action: { type: object, additionalProperties: { type: string } }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PaymentRecord:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            checkout_session_id: { type: string }
            client_id: { type: string }
            client_state: { type: string }
            resource_type: { type: string }
            resource_id: { type: string }
            resource_label: { type: string }
            payer_user_id: { type: string }
            payer_email: { type: string, format: email }
    PaymentHistoryResponse:
      type: object
      required: [payments, count]
      properties:
        payments:
          type: array
          items: { $ref: '#/components/schemas/PaymentRecord' }
        count: { type: integer }
    Refund:
      type: object
      required: [id, payment_id, amount, currency, status, created_at, updated_at]
      properties:
        id: { type: string }
        payment_id: { type: string }
        amount: { type: integer, format: int64 }
        currency: { type: string }
        status: { type: string, enum: [pending, succeeded, failed, cancelled] }
        reason: { type: string }
        provider_refund_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PayeeBalance:
      type: object
      required: [payee_id, currency, source, legacy, gross_paid_amount, platform_fee_amount, refunded_amount, held_amount, pending_payout_amount, paid_payout_amount, available_payout_amount, minimum_payout_amount, payout_destination_ready]
      properties:
        payee_id: { type: string }
        client_id: { type: string }
        currency: { type: string }
        source: { type: string, enum: [payments_legacy] }
        legacy: { type: boolean }
        gross_paid_amount: { type: integer, format: int64 }
        platform_fee_amount: { type: integer, format: int64 }
        refunded_amount: { type: integer, format: int64 }
        held_amount: { type: integer, format: int64 }
        pending_payout_amount: { type: integer, format: int64 }
        paid_payout_amount: { type: integer, format: int64 }
        available_payout_amount: { type: integer, format: int64 }
        minimum_payout_amount: { type: integer, format: int64 }
        payout_destination_ready: { type: boolean }
    CreatePayoutRequest:
      type: object
      required: [client_id, amount, currency, destination_account_id]
      additionalProperties: false
      properties:
        client_id: { type: string }
        amount: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, pattern: '^[A-Z]{3}$' }
        destination_account_id: { type: string }
        requested_by: { type: string }
        notes: { type: string }
    PayoutTransitionRequest:
      type: object
      additionalProperties: false
      properties:
        actor_id: { type: string }
        provider_reference: { type: string }
        reason: { type: string }
        notes: { type: string }
    PayoutRequest:
      type: object
      required: [id, client_id, payee_id, amount, currency, status, created_at, updated_at]
      properties:
        id: { type: string }
        client_id: { type: string }
        payee_id: { type: string }
        amount: { type: integer, format: int64 }
        currency: { type: string }
        status: { type: string, enum: [pending_review, approved, held, processing, paid, rejected, cancelled, failed] }
        destination_account_id: { type: string }
        requested_by: { type: string }
        actor_id: { type: string }
        provider_reference: { type: string }
        reason: { type: string }
        notes: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PayoutRequestListResponse:
      type: object
      required: [payout_requests, count]
      properties:
        payout_requests:
          type: array
          items: { $ref: '#/components/schemas/PayoutRequest' }
        count: { type: integer }
    WebhookEvent:
      type: object
      required: [id]
      properties:
        id: { type: string }
        type: { type: string }
        payment_id: { type: string }
        status: { type: string }
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
            details:
              type: object
              additionalProperties: { type: string }
  requestBodies:
    PayoutTransition:
      required: false
      content:
        application/json:
          schema: { $ref: '#/components/schemas/PayoutTransitionRequest' }
