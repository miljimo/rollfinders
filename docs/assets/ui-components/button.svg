<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Button component preview</title>
  <desc id="desc">Preview showing primary, neutral, secondary, danger, and small button variants.</desc>
  <rect width="960" height="360" fill="#f8faf7"/>
  <text x="48" y="68" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1c1917">Button Component</text>
  <rect x="48" y="120" width="160" height="52" rx="8" fill="#0f766e"/>
  <text x="92" y="153" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Primary</text>
  <rect x="232" y="120" width="160" height="52" rx="8" fill="#0c0a09"/>
  <text x="274" y="153" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Neutral</text>
  <rect x="416" y="120" width="168" height="52" rx="8" fill="#ffffff" stroke="#d6d3d1"/>
  <text x="462" y="153" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#292524">Secondary</text>
  <rect x="608" y="120" width="144" height="52" rx="8" fill="#ffffff" stroke="#fca5a5"/>
  <text x="656" y="153" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">Danger</text>
  <rect x="48" y="220" width="84" height="36" rx="6" fill="#ffffff" stroke="#d6d3d1"/>
  <text x="72" y="244" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#292524">View</text>
  <rect x="148" y="220" width="80" height="36" rx="6" fill="#ffffff" stroke="#fca5a5"/>
  <text x="168" y="244" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#b91c1c">Delete</text>
</svg>
