include:
  - path: ./services/api/compose.yml
  - path: ./services/payments/compose.yml
  - path: ./services/booking/compose.yml
  - path: ./services/notification/compose.yml
  - path: ./services/academy/compose.yml
  - path: ./services/users/compose.yml
  - path: ./services/courses/compose.yml
  - path: ./services/authorisation/compose.yml
  - path: ./services/organisation/compose.yml

services:
  db:
    image: postgres:16-alpine
    profiles:
      - academy
      - booking
      - notification
      - courses
      - db
      - app
      - seed
      - organisation
      - api
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rollfinder}
    ports:
      - "${DB_PORT:-54322}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/payments/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - app_database
      - service_database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    profiles:
      - academy
      - booking
      - courses
      - notification
      - app
      - seed
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_database

  seed:
    build:
      context: .
      target: migrator
    profiles:
      - seed
    command: ["npx", "prisma", "db", "seed"]
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - app_database

  app:
    build:
      context: .
      target: runner
      args:
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    profiles:
      - app
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-rollfinder-secret-for-compose}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
      API_PUBLIC_BASE_URL: http://api:8080
      NOTIFICATION_SERVICE_BASE_URL: http://notification:8080
      NOTIFICATION_API_KEY: ${NOTIFICATION_API_KEY:-local-notification-api-key}
      AUTHORISATION_COMPATIBILITY_FALLBACK: ${AUTHORISATION_COMPATIBILITY_FALLBACK:-false}
      ROLLFINDERS_APPLICATION_ID: ${ROLLFINDERS_APPLICATION_ID:-app_rollfinders}
      COURSE_SERVICE_REQUIRED: ${COURSE_SERVICE_REQUIRED:-false}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
      notification:
        condition: service_healthy
    networks:
      - frontend
      - app_database

volumes:
  postgres_data:

networks:
  frontend:
  backend:
  app_database:
  service_database:
