include:
  - path: ./apps/backend_api/containers/api/compose.yml
  - path: ./apps/backend_api/containers/payments/compose.yml
  - path: ./apps/backend_api/containers/booking/compose.yml
  - path: ./apps/backend_api/containers/notification/compose.yml
  - path: ./apps/backend_api/containers/analytics/compose.yml
  - path: ./apps/backend_api/containers/academy/compose.yml
  - path: ./apps/backend_api/containers/users/compose.yml
  - path: ./apps/backend_api/containers/courses/compose.yml
  - path: ./apps/backend_api/containers/authorisation/compose.yml
  - path: ./apps/backend_api/containers/organisation/compose.yml
  - path: ./apps/backend_api/containers/subscriptions/compose.yml
  - path: ./apps/backend_api/containers/wallet/compose.yml
  - path: ./apps/backend_api/containers/transfer/compose.yml
  - path: ./apps/backend_api/containers/pricing/compose.yml
  - path: ./apps/backend_api/containers/usage_limits/compose.yml

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    profiles:
      - academy
      - booking
      - notification
      - analytics
      - courses
      - db
      - app
      - seed
      - organisation
      - api
      - authorisation
      - subscriptions
      - wallet
      - transfer
      - pricing
      - usage-limits
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rollfinder}
    ports:
      - "${DB_PORT:-54322}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend_api/internal/services/payments/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - app_database
      - service_database
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    env_file:
      - .env
    profiles:
      - academy
      - booking
      - courses
      - notification
      - analytics
      - subscriptions
      - wallet
      - transfer
      - pricing
      - usage-limits
      - app
      - seed
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_database

  seed:
    build:
      context: .
      target: migrator
    env_file:
      - .env
    profiles:
      - seed
    command: ["npx", "prisma", "db", "seed"]
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - app_database

  app:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    env_file:
      - .env
    profiles:
      - app
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-rollfinder-secret-for-compose}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
      API_PUBLIC_BASE_URL: http://api:8080
      ACADEMY_PUBLIC_BASE_URL: http://academy:8080
      PAYMENT_PUBLIC_BASE_URL: http://payments:8080
      WALLET_INTERNAL_BASE_URL: http://wallet:8080
      PRICING_INTERNAL_BASE_URL: http://pricing:8080
      NOTIFICATION_SERVICE_BASE_URL: http://notification:8080
      NOTIFICATION_API_KEY: ${NOTIFICATION_API_KEY:-local-notification-api-key}
      ANALYTICS_SERVICE_BASE_URL: http://analytics:8080
      ANALYTICS_API_KEY: ${ANALYTICS_API_KEY:-local-analytics-api-key}
      AUTHORISATION_PUBLIC_BASE_URL: http://authorisation-api:8080
      AUTHORISATION_COMPATIBILITY_FALLBACK: ${AUTHORISATION_COMPATIBILITY_FALLBACK:-false}
      ROLLFINDERS_APPLICATION_ID: ${ROLLFINDERS_APPLICATION_ID:-app_rollfinders}
      COURSE_SERVICE_REQUIRED: ${COURSE_SERVICE_REQUIRED:-false}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
      notification:
        condition: service_healthy
      analytics:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - app_database

volumes:
  postgres_data:

networks:
  frontend:
  backend:
  app_database:
  service_database:
