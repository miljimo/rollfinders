include:
  - path: ./services/payments/compose.yml
  - path: ./services/booking/compose.yml
  - path: ./services/academy/compose.yml
  - path: ./services/users/compose.yml
  - path: ./services/courses/compose.yml
  - path: ./services/authorisation/compose.yml

services:
  db:
    image: postgres:16-alpine
    profiles:
      - academy
      - booking
      - courses
      - db
      - app
      - seed
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rollfinder}
    ports:
      - "${DB_PORT:-54322}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/payments/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    profiles:
      - academy
      - booking
      - courses
      - app
      - seed
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      target: migrator
    profiles:
      - seed
    command: ["npx", "prisma", "db", "seed"]
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      migrate:
        condition: service_completed_successfully

  app:
    build:
      context: .
      target: runner
      args:
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    profiles:
      - app
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-rollfinder-secret-for-compose}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
      PAYMENT_PUBLIC_BASE_URL: http://payments:8080
      BOOKING_PUBLIC_BASE_URL: http://booking:8080
      USER_PUBLIC_BASE_URL: http://users:8080
      AUTHORISATION_PUBLIC_BASE_URL: http://authorisation-api:8080
      AUTHORISATION_COMPATIBILITY_FALLBACK: ${AUTHORISATION_COMPATIBILITY_FALLBACK:-false}
      ROLLFINDERS_APPLICATION_ID: ${ROLLFINDERS_APPLICATION_ID:-app_rollfinders}
      COURSE_PUBLIC_BASE_URL: http://courses:8080
      ACADEMY_PUBLIC_BASE_URL: http://academy:8080
      COURSE_SERVICE_REQUIRED: ${COURSE_SERVICE_REQUIRED:-false}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      users:
        condition: service_healthy
      authorisation-api:
        condition: service_healthy
      courses:
        condition: service_healthy
      payments:
        condition: service_healthy
      booking:
        condition: service_healthy
      academy:
        condition: service_healthy

volumes:
  postgres_data:
