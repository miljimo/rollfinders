services:
  db:
    container_name: "payment_db"
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
      POSTGRES_DB: "${DB_NAME:-payments}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    container_name: "payment_app"
    build: .
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-payments}?sslmode=disable
      DB_NAME: "${DB_NAME:-payments}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      API_KEY: local-dev-key
      METRICS_ENABLED: "true"
      READ_TIMEOUT: 5s
      WRITE_TIMEOUT: 10s
      SHUTDOWN_TIMEOUT: 10s
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
