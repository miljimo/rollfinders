services:
  courses:
    build:
      context: .
    profiles:
      - courses
      - app
    environment:
      PORT: "8080"
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      API_KEY: ${COURSE_SERVICE_API_KEY:-local-course-dev-key}
      READ_TIMEOUT: 5s
      WRITE_TIMEOUT: 10s
      SHUTDOWN_TIMEOUT: 10s
    ports:
      - "127.0.0.1:${COURSE_SERVICE_PORT:-3004}:8080"
    depends_on:
      courses-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  courses-migrate:
    image: postgres:16-alpine
    profiles:
      - courses
      - app
      - seed
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./migrations:/migrations:ro
    working_dir: /migrations
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -h db
        -U ${DB_USER:-postgres}
        -d ${DB_NAME:-rollfinder}
        -f /migrations/001_coreSchema.sql
    depends_on:
      migrate:
        condition: service_completed_successfully
