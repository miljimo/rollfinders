services:
  authorisation-migrate:
    image: postgres:16-alpine
    profiles:
      - authorisation
      - app
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./migrations:/migrations:ro
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -h db
        -U ${DB_USER:-postgres}
        -d ${DB_NAME:-rollfinder}
        -f /migrations/001_core_schema.sql
    depends_on:
      db:
        condition: service_healthy
  authorisation-api:
    build: .
    profiles:
      - authorisation
      - app
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-rollfinder}?sslmode=disable
    ports:
      - "127.0.0.1:${AUTHORISATION_SERVICE_PORT:-8085}:8080"
    depends_on:
      authorisation-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
