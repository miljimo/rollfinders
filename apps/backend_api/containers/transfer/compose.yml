services:
  transfer:
    build:
      context: ../../../..
      dockerfile: apps/backend_api/containers/transfer/Dockerfile
    profiles:
      - transfer
      - app
    environment:
      PORT: "8080"
      WALLET_PUBLIC_BASE_URL: http://wallet:8080
      READ_TIMEOUT: 5s
      WRITE_TIMEOUT: 10s
      SHUTDOWN_TIMEOUT: 10s
    ports:
      - "3010:8080"
    depends_on:
      wallet:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
