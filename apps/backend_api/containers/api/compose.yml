services:
  api:
    build:
      context: ../../../..
      dockerfile: apps/backend_api/containers/api/Dockerfile
    profiles:
      - api
      - app
    environment:
      PORT: "8080"
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      READ_TIMEOUT: 10s
      WRITE_TIMEOUT: 30s
      SHUTDOWN_TIMEOUT: 10s
      JWT_SECRET: ${JWT_SECRET:-local-user-jwt-secret}
      USER_PUBLIC_BASE_URL: http://users:8080
      AUTHORISATION_PUBLIC_BASE_URL: http://authorisation-api:8080
      ACADEMY_PUBLIC_BASE_URL: http://academy:8080
      ORGANISATION_PUBLIC_BASE_URL: http://organisation-api:8080
      COURSE_PUBLIC_BASE_URL: http://courses:8080
      BOOKING_PUBLIC_BASE_URL: http://booking:8080
      PAYMENT_PUBLIC_BASE_URL: http://payments:8080
      LEGACY_NEXT_PUBLIC_BASE_URL: http://app:3000
      ROLLFINDERS_APPLICATION_ID: ${ROLLFINDERS_APPLICATION_ID:-app_rollfinders}
    ports:
      - "127.0.0.1:${API_SERVICE_PORT:-3007}:8080"
    depends_on:
      db:
        condition: service_healthy
      users:
        condition: service_healthy
      authorisation-api:
        condition: service_healthy
      academy:
        condition: service_healthy
      organisation-api:
        condition: service_healthy
      courses:
        condition: service_healthy
      booking:
        condition: service_healthy
      payments:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - service_database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
