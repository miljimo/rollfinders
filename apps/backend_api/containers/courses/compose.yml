services:
  courses:
    build:
      context: ../../../..
      dockerfile: apps/backend_api/containers/courses/Dockerfile
    profiles:
      - courses
      - app
    environment:
      PORT: "8080"
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      READ_TIMEOUT: 5s
      WRITE_TIMEOUT: 10s
      SHUTDOWN_TIMEOUT: 10s
    depends_on:
      courses-migrate:
        condition: service_completed_successfully
    networks:
      - backend
      - service_database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  courses-migrate:
    image: postgres:16-alpine
    profiles:
      - courses
      - app
      - seed
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ../../internal/services/courses/migrations:/migrations:ro
    working_dir: /migrations
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -h db
        -U ${DB_USER:-postgres}
        -d ${DB_NAME:-rollfinder}
        -f /migrations/001_coreSchema.sql
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - service_database
