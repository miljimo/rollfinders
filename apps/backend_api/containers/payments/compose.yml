services:
  payments:
    build:
      context: ../../../..
      dockerfile: apps/backend_api/containers/payments/Dockerfile
    profiles:
      - payments
      - app
    environment:
      PORT: "8080"
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      PAYMENT_GATEWAY_API_KEY: ${PAYMENT_GATEWAY_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_SECRET_KEY_FILE: ${STRIPE_SECRET_KEY_FILE:-}
      PAYMENT_PUBLIC_BASE_URL: ${PAYMENT_PUBLIC_BASE_URL:-http://localhost:3002}
      PAYMENT_DEFAULT_CLIENT_ID: ${PAYMENT_DEFAULT_CLIENT_ID:-rollfinders}
      PAYMENT_DEFAULT_CLIENT_NAME: ${PAYMENT_DEFAULT_CLIENT_NAME:-Rollfinders}
      PAYMENT_DEFAULT_CLIENT_CALLBACK_URL: ${PAYMENT_DEFAULT_CLIENT_CALLBACK_URL:-http://localhost:3000/payments/status}
      METRICS_ENABLED: "true"
      READ_TIMEOUT: 5s
      WRITE_TIMEOUT: 10s
      SHUTDOWN_TIMEOUT: 10s
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PAYMENT_PUBLIC_PORT:-3002}:8080"
    networks:
      - backend
      - service_database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
