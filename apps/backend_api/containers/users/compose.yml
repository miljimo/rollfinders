services:
  users:
    build:
      context: ../../../..
      dockerfile: apps/backend_api/containers/users/Dockerfile
    profiles:
      - users
      - app
    environment:
      PORT: "8080"
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      DEFAULT_USER_ROLE: ${USER_SERVICE_DEFAULT_USER_ROLE:-STANDARD_USER}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@rollfinder.com}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-RollFinder Admin}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-admin}
      AUTHORISATION_CUTOVER: ${AUTHORISATION_CUTOVER:-true}
      READ_TIMEOUT: 5s
      WRITE_TIMEOUT: 10s
      SHUTDOWN_TIMEOUT: 10s
    depends_on:
      users-migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${USER_SERVICE_PORT:-3003}:8080"
    networks:
      - backend
      - service_database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  users-migrate:
    image: postgres:16-alpine
    profiles:
      - users
      - app
      - seed
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ../../internal/services/users/migrations:/migrations:ro
    working_dir: /migrations
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -h db
        -U ${DB_USER:-postgres}
        -d ${DB_NAME:-rollfinder}
        -f /migrations/001_core_schema.sql
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - service_database
