image: node:22

definitions:
  services:
    docker:
      memory: 3072
  caches:
    node: ~/.npm
  steps:
    - step: &validate
        name: Static Code Analysis
        caches:
          - node
        script:
          - npm ci
          - npm run db:generate
          - npm run lint
          - npm run typecheck
          - npm run test
          - apt-get update && apt-get install -y unzip curl
          - curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.8.2/terraform_1.8.2_linux_amd64.zip
          - unzip terraform.zip -d /usr/local/bin
          - cd terraform
          - terraform fmt -check
          - terraform init -backend=false
          - terraform validate
    - step: &deploy
        name: Terraform Deploy
        oidc: true
        services:
          - docker
        caches:
          - node
        script:
          - apt-get update && apt-get install -y unzip curl jq python3 python3-pip
          - curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.8.2/terraform_1.8.2_linux_amd64.zip
          - unzip terraform.zip -d /usr/local/bin
          - pip3 install awscli --break-system-packages
          - chmod +x scripts/cicd/*.sh
          - scripts/cicd/deploy.sh
          - scripts/cicd/migrate.sh
          - scripts/cicd/smoke.sh

pipelines:
  default:
    - step: *validate

  custom:
    destroy-dev:
      - step:
          <<: *deploy
          name: Destroy Dev
          deployment: test
          script:
            - apt-get update && apt-get install -y unzip curl jq python3 python3-pip
            - curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.8.2/terraform_1.8.2_linux_amd64.zip
            - unzip terraform.zip -d /usr/local/bin
            - pip3 install awscli --break-system-packages
            - chmod +x scripts/cicd/*.sh scripts/*.sh
            - ./scripts/destroy-env.sh dev
    destroy-staging:
      - step:
          <<: *deploy
          name: Destroy Staging
          deployment: staging
          script:
            - export CONFIRM_DESTROY="destroy staging"
            - apt-get update && apt-get install -y unzip curl jq python3 python3-pip
            - curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.8.2/terraform_1.8.2_linux_amd64.zip
            - unzip terraform.zip -d /usr/local/bin
            - pip3 install awscli --break-system-packages
            - chmod +x scripts/cicd/*.sh scripts/*.sh
            - ./scripts/destroy-env.sh staging
    destroy-production:
      - variables:
          - name: ALLOW_PRODUCTION_DESTROY
            default: "false"
          - name: PRODUCTION_DESTROY_CONFIRMATION
            default: ""
      - step:
          <<: *deploy
          name: Destroy Production
          deployment: production
          script:
            - apt-get update && apt-get install -y unzip curl jq python3 python3-pip
            - curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.8.2/terraform_1.8.2_linux_amd64.zip
            - unzip terraform.zip -d /usr/local/bin
            - pip3 install awscli --break-system-packages
            - chmod +x scripts/cicd/*.sh scripts/*.sh
            - ./scripts/destroy-env.sh production

  branches:
    "feature/*":
      - step: *validate
      - step:
          <<: *deploy
          name: Build Image And Deploy Dev
          deployment: test
          script:
            - export ENVIRONMENT_NAME=dev
            - apt-get update && apt-get install -y unzip curl jq python3 python3-pip
            - curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.8.2/terraform_1.8.2_linux_amd64.zip
            - unzip terraform.zip -d /usr/local/bin
            - pip3 install awscli --break-system-packages
            - chmod +x scripts/cicd/*.sh
            - scripts/cicd/deploy.sh
            - scripts/cicd/migrate.sh
            - scripts/cicd/smoke.sh
    staging:
      - step: *validate
      - step:
          <<: *deploy
          name: Build Image And Deploy Staging
          deployment: staging
          trigger: manual
          script:
            - export ENVIRONMENT_NAME=staging
            - apt-get update && apt-get install -y unzip curl jq python3 python3-pip
            - curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.8.2/terraform_1.8.2_linux_amd64.zip
            - unzip terraform.zip -d /usr/local/bin
            - pip3 install awscli --break-system-packages
            - chmod +x scripts/cicd/*.sh
            - scripts/cicd/deploy.sh
            - scripts/cicd/migrate.sh
            - scripts/cicd/smoke.sh
    main:
      - step: *validate
      - step:
          <<: *deploy
          name: Build Image And Deploy Production
          deployment: production
          trigger: manual
          script:
            - export ENVIRONMENT_NAME=production
            - export PRODUCTION_APPROVED=true
            - export PRODUCTION_MIGRATION_APPROVED=true
            - apt-get update && apt-get install -y unzip curl jq python3 python3-pip
            - curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.8.2/terraform_1.8.2_linux_amd64.zip
            - unzip terraform.zip -d /usr/local/bin
            - pip3 install awscli --break-system-packages
            - chmod +x scripts/cicd/*.sh
            - scripts/cicd/deploy.sh
            - scripts/cicd/migrate.sh
            - scripts/cicd/smoke.sh
