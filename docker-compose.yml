services:
  db:
    image: postgres:16-alpine
    profiles:
      - db
      - app
      - seed
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rollfinder}
    ports:
      - "${DB_PORT:-54322}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    profiles:
      - app
      - seed
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      target: migrator
    profiles:
      - seed
    command: ["npx", "prisma", "db", "seed"]
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      migrate:
        condition: service_completed_successfully

  app:
    build:
      context: .
      target: runner
      args:
        GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    profiles:
      - app
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    environment:
      DB_NAME: ${DB_NAME:-rollfinder}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-rollfinder-secret-for-compose}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payments:8080}
      PAYMENT_SERVICE_API_KEY: ${PAYMENT_SERVICE_API_KEY:-local-dev-key}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  payments-db:
    image: postgres:16-alpine
    profiles:
      - payments
    environment:
      POSTGRES_USER: ${PAYMENTS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PAYMENTS_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${PAYMENTS_DB_NAME:-payments}
    ports:
      - "${PAYMENTS_DB_PORT:-54323}:5432"
    volumes:
      - payments_postgres_data:/var/lib/postgresql/data
      - ./services/payments/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  payments:
    build:
      context: ./services/payments
    profiles:
      - payments
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${PAYMENTS_DB_USER:-postgres}:${PAYMENTS_DB_PASSWORD:-postgres}@payments-db:5432/${PAYMENTS_DB_NAME:-payments}?sslmode=disable
      API_KEY: ${PAYMENT_SERVICE_API_KEY:-local-dev-key}
      PAYMENT_PUBLIC_BASE_URL: ${PAYMENT_PUBLIC_BASE_URL:-http://localhost:8080}
      PAYMENT_APPLICATION_STATUS_URL: ${PAYMENT_APPLICATION_STATUS_URL:-http://localhost:3000/payments/status}
      METRICS_ENABLED: "true"
      READ_TIMEOUT: 5s
      WRITE_TIMEOUT: 10s
      SHUTDOWN_TIMEOUT: 10s
    ports:
      - "${PAYMENT_SERVICE_PORT:-8080}:8080"
    depends_on:
      payments-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  payments_postgres_data:
